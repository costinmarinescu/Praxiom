name: praxiom-firmware

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install ARM toolchain and build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Detect ARM toolchain root
        id: detect
        shell: bash
        run: |
          # Find the installed cross-compiler and derive its root (/usr)
          BIN="$(which arm-none-eabi-gcc)"
          ROOT="$(dirname "$(dirname "$BIN")")"
          echo "arm-none-eabi-gcc at: $BIN"
          echo "Toolchain root: $ROOT"
          echo "toolchain_root=$ROOT" >> "$GITHUB_OUTPUT"

      - name: Configure (CMake + Ninja)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DARM_NONE_EABI_TOOLCHAIN_PATH='${{ steps.detect.outputs.toolchain_root }}'

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: List build outputs
        run: |
          echo "==> Firmware outputs (build/src)"
          ls -lAh build/src || true
          echo "==> Map files (if generated)"
          find build -name '*.map' -print || true

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: praxiom-firmware-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/src/*.out
            build/src/*.zip
            build/src/*.bin
            build/src/*.hex
            build/**/*.map
