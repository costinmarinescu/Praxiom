name: praxiom-firmware

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NRF5_SDK_VERSION: 17.1.0_ddde560
  NRF5_SDK_DIRNAME: nRF5_SDK_17.1.0_ddde560
  NRF5_SDK_URL: https://developer.nordicsemi.com/nRF5_SDK/nRF5_SDK_v17.x.x/nRF5_SDK_17.1.0_ddde560.zip
  NRF5_SDK_PATH: ${{ github.workspace }}/_deps/nRF5_SDK_17.1.0_ddde560

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install toolchain & deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib \
            unzip curl

      - name: Cache nRF5 SDK
        id: nrf5_cache
        uses: actions/cache@v4
        with:
          path: _deps/${{ env.NRF5_SDK_DIRNAME }}
          key: nrf5sdk-${{ env.NRF5_SDK_VERSION }}

      - name: Fetch nRF5 SDK (if cache miss)
        if: steps.nrf5_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p _deps
          cd _deps
          echo "Downloading nRF5 SDK ${NRF5_SDK_VERSION}..."
          curl -L -o nrf5.zip "${NRF5_SDK_URL}"
          unzip -q nrf5.zip
          rm -f nrf5.zip
          ls -la

      - name: Detect ARM toolchain root
        id: detect
        shell: bash
        run: |
          BIN="$(which arm-none-eabi-gcc)"
          ROOT="$(dirname "$(dirname "$BIN")")"
          echo "arm-none-eabi-gcc: $BIN"
          echo "toolchain root:    $ROOT"
          echo "toolchain_root=$ROOT" >> "$GITHUB_OUTPUT"

      - n
