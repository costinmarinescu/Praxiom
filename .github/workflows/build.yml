name: build-praxiom-firmware
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Toolchain & build deps
      - name: Install ARM toolchain & build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi \
            ninja-build cmake unzip curl

      # Node.js (for lv_font_conv)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lv_font_conv
        run: |
          sudo npm i -g lv_font_conv
          which lv_font_conv
          lv_font_conv --version

      # Cache the Nordic SDK to speed up builds
      - name: Cache nRF5 SDK
        id: cache-nrf5
        uses: actions/cache@v4
        with:
          path: $HOME/sdk/nrf5
          key: nrf5sdk-17.0.2

      # Download only if cache missed
      - name: Fetch Nordic nRF5 SDK 17.0.2 (if needed)
        if: steps.cache-nrf5.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/sdk
          cd $HOME/sdk
          curl -L -o nrf5.zip https://developer.nordicsemi.com/nRF5_SDK/nRF5_SDK_v17.x.x/nRF5_SDK_17.0.2_d674dde.zip
          unzip -q nrf5.zip
          rm -f nrf5.zip
          mv nRF5_SDK_17.0.2_d674dde nrf5

      # Ensure Praxiom include once (safe if already present)
      - name: Ensure Praxiom CMake include (idempotent)
        run: |
          if ! grep -q 'firmware/CMakeLists.additions.txt' CMakeLists.txt; then
            echo 'include(${CMAKE_SOURCE_DIR}/firmware/CMakeLists.additions.txt OPTIONAL)' >> CMakeLists.txt
          fi

      # Configure (Release + DFU) with Praxiom flags
      - name: Configure
        run: |
          cmake -B build -S . -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DARM_NONE_EABI_TOOLCHAIN_PATH=/usr \
            -DNRF5_SDK_PATH=$HOME/sdk/nrf5 \
            -DPRAXIOM_ENABLE=ON \
            -DINFITIME_DISABLE_GAMES=ON \
            -DPRAXIOM_DEFAULT_WATCHFACE=ON \
            -DBUILD_DFU=ON

      - name: Build
        run: cmake --build build -j

      - name: Upload DFU
        uses: actions/upload-artifact@v4
        with:
          name: praxiom-dfu
          path: build/pinetime-mcuboot-app-dfu.zip
